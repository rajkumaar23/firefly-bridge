name: Release

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install arm64 cross-compiler
        if: matrix.goarch == 'arm64'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          # firefly-bridge requires CGO for the 1Password SDK on all architectures.
          # arm64 uses the system cross-compiler; amd64 uses native gcc.
          CGO_ENABLED: 1
          CC: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
        run: |
          go build -trimpath -ldflags="-s -w" -o firefly-bridge-linux-${{ matrix.goarch }} ./cmd/firefly-bridge

          # backfill-hashes and portfolio-sync has no CGO deps.
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o portfolio-sync-linux-${{ matrix.goarch }} ./cmd/portfolio-sync
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o backfill-hashes-linux-${{ matrix.goarch }} ./cmd/backfill-hashes

      - uses: actions/upload-artifact@v7
        with:
          name: binaries-linux-${{ matrix.goarch }}
          path: |
            firefly-bridge-linux-${{ matrix.goarch }}
            portfolio-sync-linux-${{ matrix.goarch }}
            backfill-hashes-linux-${{ matrix.goarch }}

  build-darwin:
    name: Build macOS binaries
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-latest
            goarch: arm64
          - runner: macos-15-intel
            goarch: amd64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          go build -trimpath -ldflags="-s -w" -o firefly-bridge-darwin-${{ matrix.goarch }} ./cmd/firefly-bridge

          # backfill-hashes and portfolio-sync have no CGO deps.
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o portfolio-sync-darwin-${{ matrix.goarch }} ./cmd/portfolio-sync
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o backfill-hashes-darwin-${{ matrix.goarch }} ./cmd/backfill-hashes

      - uses: actions/upload-artifact@v7
        with:
          name: binaries-darwin-${{ matrix.goarch }}
          path: |
            firefly-bridge-darwin-${{ matrix.goarch }}
            portfolio-sync-darwin-${{ matrix.goarch }}
            backfill-hashes-darwin-${{ matrix.goarch }}

  release:
    name: Publish GitHub release
    needs: [build, build-darwin]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="sha-${GITHUB_SHA::7}"
          gh release create "$TAG" \
            --title "$TAG" \
            firefly-bridge-linux-amd64 \
            firefly-bridge-linux-arm64 \
            firefly-bridge-darwin-amd64 \
            firefly-bridge-darwin-arm64 \
            portfolio-sync-linux-amd64 \
            portfolio-sync-linux-arm64 \
            portfolio-sync-darwin-amd64 \
            portfolio-sync-darwin-arm64 \
            backfill-hashes-linux-amd64 \
            backfill-hashes-linux-arm64 \
            backfill-hashes-darwin-amd64 \
            backfill-hashes-darwin-arm64 \

  docker:
    name: Publish Docker image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/firefly-portfolio-sync
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.portfolio-sync
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
