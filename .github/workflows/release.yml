name: Release

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w" -o firefly-bridge-linux-${{ matrix.goarch }} ./cmd/firefly-bridge
          go build -trimpath -ldflags="-s -w" -o portfolio-sync-linux-${{ matrix.goarch }} ./cmd/portfolio-sync

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-linux-${{ matrix.goarch }}
          path: |
            firefly-bridge-linux-${{ matrix.goarch }}
            portfolio-sync-linux-${{ matrix.goarch }}

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Recreate latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest \
            --title "Latest" \
            --notes "Built from ${{ github.sha }}" \
            --prerelease \
            firefly-bridge-linux-amd64 \
            firefly-bridge-linux-arm64 \
            portfolio-sync-linux-amd64 \
            portfolio-sync-linux-arm64

  docker:
    name: Publish Docker image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ ${{ github.repository_owner }}/firefly-portfolio-sync
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.portfolio-sync
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
